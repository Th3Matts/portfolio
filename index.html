<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="./assets/images/leaf_white.svg" type="image/x-icon">
    <title>Th3Matts Page</title>
    <link rel="stylesheet" href="./assets/style/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <header>
        <img src="./assets/images/leaf_white.svg" alt="Leaf logo" />
        <nav>
          <div class="lang-wrapper">
            <button id="lang-pt">pt</button> | <button id="lang-en">en</button>
          </div>
          <ul>
            <li><a href="#" data-en="About" data-pt="Sobre mim">About</a></li>
            <li><a href="#projects" data-en="Projects" data-pt="Projetos">Projects</a></li>
            <li><a href="#contact" data-en="Contact" data-pt="Fale comigo">Contact</a></li>
          </ul>
        </nav>
      </header>
      <main>
        <section id="about">
          <img src="./assets/images/Ghatts.jpeg" oncontextmenu="return false;" alt="">
          <div class="text-wrapper" >
            <p data-en="I'm Matheus Silva, a <span>web developer</span> with a background in tech-adjacent client work."
             data-pt="Sou Matheus Silva, um <span>desenvolvedor web</span>, com experiência prévia em trabalhos com clientes na área de tecnologia.">
             I'm Matheus Silva, a <span>web developer</span> with a background in tech-adjacent client work.
            </p>
            <p data-en="Currently seeking <span>junior/entry-level web developer opportunities</span>, open to remote work."
               data-pt="Atualmente em busca de <span>oportunidades de desenvolvedor web júnior/nível inicial</span>, aberto(a) a trabalho remoto.">
               Currently seeking <span>junior/entry-level web developer opportunities</span>, open to remote work.
            </p>
          </div>
        </section>

        <section id="projects">
          <h1>Projects</h1>
          <div class="card-wrapper">
            <figure id="project-1">
              <div class="card">
                <img src="./assets/images/p1.png" alt="Rock Paper Scissors game screenshot" oncontextmenu="return false;">
              </div>
              <figcaption>
                <h3 data-en="Rock, paper, scissors" data-pt="Pedra, papel e tesoura">Rock, paper, scissors</h3>
                <div class="tag-wrapper">
                  <div class="tag">HTML</div>
                  <div class="tag">CSS</div>
                  <div class="tag">JavaScript</div>
                </div>
                <p 
                data-en="A browser-based Rock, Paper, Scissors game built with vanilla HTML, CSS, and JavaScript. The first player to reach 5 points wins the match."
                data-pt="Um jogo de Pedra, Papel e Tesoura baseado em navegador, construído com HTML, CSS e JavaScript puros. O primeiro jogador a atingir 5 pontos vence a partida."
                >
                A browser-based Rock, Paper, Scissors game built with vanilla HTML, CSS, and JavaScript. The first player to reach 5 points wins the match.
                </p>
                <div class="button-wrapper">
                  <button>
                    <img src="./assets/images/play.png" alt="Play button">
                    <a href="https://th3matts.github.io/foundationsP3/" target="_blank" rel="noopener noreferrer" data-en="Try me!" data-pt="Me teste!">Try me!</a>
                  </button>
                  <button>
                    <img src="./assets/images/octocat.svg" alt="Github mascot octocat">
                    <a href="https://github.com/Th3Matts/foundationsP3" target="_blank" rel="noopener noreferrer">GitHub</a>
                  </button>
                </div>
              </figcaption>
            </figure>

            <figure id="project-2">
              <div class="card">
                <img src="./assets/images/p3.png" alt="The calculator" oncontextmenu="return false;">
              </div>
              <figcaption>
                <h3 data-en="Calculator" data-pt="Calculadora">Calculator</h3>
                <div class="tag-wrapper">
                  <div class="tag">HTML</div>
                  <div class="tag">CSS</div>
                  <div class="tag">JavaScript</div>
                </div>
                <p
                data-en="A browser-based calculator built with vanilla HTML, CSS, and JavaScript. Supports both mouse clicks and keyboard input, chained operations, and standard decimal arithmetic."
                data-pt="Uma calculadora baseada em navegador, construída com HTML, CSS e JavaScript puros. Suporta tanto cliques do mouse quanto entrada pelo teclado, operações encadeadas e aritmética decimal padrão."
                > 
                  A browser-based calculator built with vanilla HTML, CSS, and JavaScript. Supports both mouse clicks and keyboard input, chained operations, and standard decimal arithmetic.
                </p>
                <div class="button-wrapper">
                  <button>
                    <img src="./assets/images/play.png" alt="Play button">
                    <a class="btn" href="https://th3matts.github.io/foundationsP5/" target="_blank" rel="noopener noreferrer" data-en="Try me!" data-pt="Me teste!">Try me!</a>
                  </button>
                  <button>
                    <img src="./assets/images/octocat.svg" alt="Github mascot octocat">
                     <a href="https://github.com/Th3Matts/foundationsP5" target="_blank" rel="noopener noreferrer">GitHub</a>
                  </button>
                </div>
              </figcaption>
            </figure>
            
          </div>
        </section>

        <section id="contact">
          <div class="contact-card">
            <h2 data-en="Let's connect" data-pt="Vamos conversar">
              Let's connect</h2>
            <div class="contact-links">
              <a href="mailto:matrodriguessilva@gmail.com">
                <img src="./assets/images/email.svg" alt="A letter">
                matrodriguessilva@gmail.com
              </a>
              <a href="https://linkedin.com/in/matrodriguessilva" target="_blank" rel="noopener noreferrer">
                <img src="./assets/images/linkedin.png" alt="LinkedIn logo, it's a 'i' and 'n' inside a square">
                LinkedIn
              </a>
              <a href="https://github.com/Th3Matts" target="_blank" rel="noopener noreferrer">
                <img src="./assets/images/octocat.svg" alt="Github mascot octocat">
                GitHub
              </a>
            </div>
          </div>
        </section>
      </main>

      <footer>
        <a href="https://github.com/Th3Matts" target="_blank"
          ><img src="./assets/images/logo-white.svg" oncontextmenu="return false;" alt=""
        /></a>
      </footer>
    </div>
    <script src="./scripts/portfolio.js" ></script>
  </body>
</html>
